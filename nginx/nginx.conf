# NOTE: This file is regenerated on every EC2 boot by startup.sh.
# startup.sh writes a fresh base config here, then certbot adds the SSL block.
# The final live config on EC2 will have a server_name matching <IP>.sslip.io
# and Let's Encrypt SSL directives injected by certbot.

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    sendfile            on;
    tcp_nopush          on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    include             /etc/nginx/mime.types;
    default_type        application/octet-stream;
    include             /etc/nginx/conf.d/*.conf;

    # Allow unlimited upload size so large Docker image layers are never blocked
    client_max_body_size 0;

    # HTTP server — certbot will convert this to an HTTPS redirect on first run
    server {
        listen       80 default_server;
        listen       [::]:80 default_server;
        server_name  _;

        # React frontend (static files built by Vite)
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri /index.html;
        }

        # Node.js backend API
        location /api/ {
            proxy_pass http://localhost:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Docker Registry V2 API — chunked headers required for concurrent blob uploads
        location /v2/ {
            proxy_pass http://localhost:5000;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            chunked_transfer_encoding on;
        }
    }
}
